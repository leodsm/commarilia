<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flash de Notícias - ComMarília</title>
    <!-- Chosen Palette: Marília Sunset -->
    <!-- Application Structure Plan: A arquitetura é um "Explorador Temático em formato Story". Utiliza um slider vertical principal para navegar entre notícias distintas e sliders horizontais aninhados para explorar segmentos dentro de cada notícia. Um menu de categorias no cabeçalho permite a filtragem e navegação rápida, enquanto um modal "Leia Mais" oferece conteúdo detalhado sob demanda. Esta estrutura foi escolhida por ser uma implementação direta do relatório-fonte, otimizada para o consumo de conteúdo em dispositivos móveis e por emular padrões de UX familiares de redes sociais, garantindo uma experiência de utilizador intuitiva e envolvente. -->
    <!-- Visualization & Content Choices: Informação do Relatório: Estrutura do projeto -> Objetivo: Criar uma app de "stories" interativa -> Método de Apresentação: Sliders aninhados (Swiper.js) para navegação 2D; slides de imagem em ecrã inteiro para imersão; modal para texto detalhado. -> Interação: Gestos de deslizar (swipe), cliques nas categorias para filtrar. -> Justificação: Implementa diretamente o design "mobile-first" do utilizador, replicando uma UX moderna e comprovada para consumo de conteúdo. -> Biblioteca: Swiper.js. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overscroll-behavior: contain; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        .mobile-frame { 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); 
            border-radius: 2.5rem; 
            overflow: hidden; 
            position: relative; 
            background-color: #000; 
            transition: width 0.2s ease, height 0.2s ease;
        }
        .swiper-container-v, .swiper-container-h, .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; text-align: center; color: #fff; background-size: cover; background-position: center; position: relative; overflow: hidden; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.2) 100%); }
        .slide-video-bg { position: absolute; top: 50%; left: 50%; width: auto; height: auto; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); z-index: -1; }
        .swiper-pagination-horizontal { top: 10px; bottom: auto; }
        .swiper-pagination-bullet { width: 8px; height: 8px; background-color: rgba(255, 255, 255, 0.6); opacity: 1; }
        .swiper-pagination-bullet-active { background-color: #fd572b; }
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .category-link.active { background-color: #fd572b; color: white; font-weight: 700; box-shadow: 0 0 15px rgba(253, 87, 43, 0.5); }
        .text-shadow { text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .swiper-container-categories { -webkit-mask-image: linear-gradient(to right, transparent, black 1.5rem); mask-image: linear-gradient(to right, transparent, black 1.5rem); }
        .prose p { margin-bottom: 1em; }
        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 { font-family: 'Poppins', sans-serif; margin-top: 1.5em; margin-bottom: 0.5em; }
        #loader { border: 4px solid #f3f3f3; border-top: 4px solid #fd572b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<!-- MODIFICATION: Body now centers a single component container. -->
<body class="flex items-center justify-center h-screen bg-black overflow-hidden">

    <!-- MODIFICATION: A new wrapper to group header and frame, allowing them to be centered as a single block. -->
    <div class="flex flex-col">
        <header class="z-20 p-4 flex items-center gap-4 bg-gray-800 flex-shrink-0">
            <h1 class="text-white text-xl font-poppins font-bold flex-shrink-0">Com<span class="text-[#fd572b]">Marília</span></h1>
            <div class="swiper-container-categories flex-grow min-w-0">
                <div class="swiper-wrapper" id="categories-wrapper"></div>
            </div>
        </header>

        <div class="mobile-frame">
            <div id="app" class="w-full h-full relative bg-black">
                <div id="loader-container" class="absolute inset-0 z-40 bg-black flex items-center justify-center">
                    <div id="loader"></div>
                </div>

                <div class="swiper swiper-container-v h-full">
                    <div class="swiper-wrapper" id="news-wrapper"></div>
                </div>
                
                <div id="onboarding-overlay" class="hidden absolute inset-0 z-30 bg-black/80 flex flex-col items-center justify-center text-white text-center p-8 cursor-pointer transition-opacity duration-500">
                    <h2 class="text-3xl font-poppins font-bold mb-12">Como Navegar</h2>
                    <div class="flex flex-col gap-10">
                        <div class="flex flex-col items-center gap-2"><div class="text-3xl">&#9650;</div><p class="font-bold tracking-wider">ARRASTE PARA CIMA</p><p class="text-sm text-white/70">Para ver a próxima notícia</p></div>
                        <div class="flex flex-col items-center gap-2"><div class="text-3xl">&#9654;</div><p class="font-bold tracking-wider">ARRASTE PARA O LADO</p><p class="text-sm text-white/70">Para ver mais sobre este assunto</p></div>
                    </div>
                    <p class="absolute bottom-10 text-sm text-white/50">Toque em qualquer lugar para começar</p>
                </div>

                <div id="read-more-modal" class="modal invisible opacity-0 fixed inset-0 z-50 bg-black/70 flex items-center justify-center">
                    <div class="bg-white w-full h-full md:w-[450px] md:h-auto md:max-h-[90vh] md:rounded-2xl overflow-y-auto relative">
                         <button id="close-modal-btn" class="sticky top-4 right-4 float-right text-gray-600 bg-white/70 rounded-full p-1 z-10 mr-4"><span class="text-2xl font-bold">&times;</span></button>
                        <div id="modal-content">
                            <img id="modal-img" src="" alt="Imagem da notícia" class="w-full h-64 object-cover">
                            <div class="p-6">
                                <h2 id="modal-title" class="text-2xl font-bold font-poppins text-gray-800 mb-4"></h2>
                                <div id="modal-body" class="text-gray-700 leading-relaxed prose"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- START: Aspect Ratio & Resize Logic ---
            // MODIFICATION: Get header to sync its width with the frame.
            const header = document.querySelector('header');
            const mobileFrame = document.querySelector('.mobile-frame');

            function resizeAndPositionFrame() {
                const aspectRatio = 9 / 16;
                const availableWidth = window.innerWidth;
                const availableHeight = window.innerHeight;

                const headerHeight = header.offsetHeight;
                if (!headerHeight) { // Retry if header hasn't rendered yet
                    setTimeout(resizeAndPositionFrame, 50);
                    return;
                }
                
                let finalFrameWidth;
                let finalFrameHeight;

                // Calculate dimensions assuming width is the constraint first
                let potentialFrameWidth = availableWidth;
                let potentialFrameHeight = potentialFrameWidth / aspectRatio;
                
                // Check if the combined height of header and frame fits in the viewport
                if (potentialFrameHeight + headerHeight <= availableHeight) {
                    // It fits. Width is the limiting factor.
                    finalFrameWidth = potentialFrameWidth;
                    finalFrameHeight = potentialFrameHeight;
                } else {
                    // It doesn't fit. Height is the limiting factor.
                    finalFrameHeight = availableHeight - headerHeight;
                    finalFrameWidth = finalFrameHeight * aspectRatio;
                }

                // Apply the calculated width to both header and frame for visual consistency
                header.style.width = `${finalFrameWidth}px`;
                mobileFrame.style.width = `${finalFrameWidth}px`;
                mobileFrame.style.height = `${finalFrameHeight}px`;
            }
            // --- END: Aspect Ratio & Resize Logic ---

            const GRAPHQL_ENDPOINT = 'https://portal.commarilia.com/graphql';
            const newsWrapper = document.getElementById('news-wrapper');
            const categoriesWrapper = document.getElementById('categories-wrapper');
            const modal = document.getElementById('read-more-modal');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const onboardingOverlay = document.getElementById('onboarding-overlay');
            const loaderContainer = document.getElementById('loader-container');

            let mainSwiper;
            let newsData = [];

            window.addEventListener('resize', () => {
                resizeAndPositionFrame();
                if (mainSwiper && mainSwiper.slides.length > 0) {
                    mainSwiper.update();
                    mainSwiper.slides.forEach(slide => {
                        const horizontalSwiper = slide.querySelector('.swiper-container-h')?.swiper;
                        if (horizontalSwiper) {
                            horizontalSwiper.update();
                        }
                    });
                }
            });

            const GQL_QUERY = `
                query GetStories {
                    posts(first: 50) {
                        nodes {
                            title
                            content
                            featuredImage {
                                node {
                                    sourceUrl(size: LARGE)
                                }
                            }
                            categories {
                                nodes {
                                    name
                                }
                            }
                            conteudoDosStories {
                                conteudo {
                                    slides {
                                        media {
                                            node {
                                                mediaItemUrl
                                                mimeType
                                            }
                                        }
                                        title
                                        text
                                        contentPosition
                                        textSize
                                        showOverlay
                                        showButton
                                    }
                                }
                            }
                        }
                    }
                }`;

            async function fetchNewsData() {
                try {
                    const response = await fetch(GRAPHQL_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: GQL_QUERY })
                    });
                    const json = await response.json();
                    if (json.errors) {
                        throw new Error('GraphQL Error: ' + json.errors.map(e => e.message).join('\n'));
                    }
                    return transformData(json.data.posts.nodes);
                } catch (error) {
                    console.error("Failed to fetch news data:", error);
                    loaderContainer.innerHTML = `<p class="text-white text-center">Não foi possível carregar o conteúdo.<br>Tente novamente mais tarde.</p>`;
                    return null;
                }
            }

            function generateDescription(html) {
                if (!html) return '';
                const div = document.createElement('div');
                div.innerHTML = html;

                const listItems = div.querySelectorAll('li');

                if (listItems.length > 0) {
                    let htmlContent = '';
                    listItems.forEach(li => {
                        htmlContent += `• ${li.textContent.trim()}<br>`;
                    });
                    return htmlContent;
                } else {
                    const text = div.textContent || div.innerText || '';
                    return text;
                }
            }
            
            function transformData(nodes) {
                return nodes.map(post => {
                    const slides = post.conteudoDosStories?.conteudo?.slides || [];
                    return {
                        category: post.categories?.nodes[0]?.name || 'Geral',
                        postTitle: post.title,
                        postContent: post.content || '<p>Conteúdo principal não disponível.</p>',
                        featuredImageUrl: post.featuredImage?.node?.sourceUrl,
                        segments: slides.map(slide => ({
                            mediaUrl: slide.media?.node?.mediaItemUrl,
                            mediaType: slide.media?.node?.mimeType,
                            title: slide.title || post.title,
                            description: generateDescription(slide.text),
                            fullContent: slide.text || '<p>Conteúdo do slide não disponível.</p>',
                            contentPosition: slide.contentPosition || 'bottom',
                            textSize: slide.textSize || 'medium',
                            showOverlay: slide.showOverlay !== false,
                            showButton: slide.showButton !== false
                        }))
                    };
                }).filter(story => story.segments.length > 0);
            }
            
            function populateNewsAndCategories() {
                newsWrapper.innerHTML = '';
                categoriesWrapper.innerHTML = '';

                newsData.forEach((newsItem, newsIndex) => {
                    const verticalSlide = document.createElement('div');
                    verticalSlide.className = 'swiper-slide';
                    verticalSlide.dataset.category = newsItem.category;
                    
                    const slidesHTML = newsItem.segments.map((segment, segmentIndex) => {
                        const isVideo = segment.mediaType && segment.mediaType.startsWith('video/');
                        const mediaTag = isVideo 
                            ? `<video class="slide-video-bg" autoplay muted loop playsinline src="${segment.mediaUrl}"></video>`
                            : '';
                        const bgStyle = isVideo ? '' : `style="background-image: url('${segment.mediaUrl}')"`;

                        const contentPositionClass = {
                            top: 'justify-start',
                            center: 'justify-center',
                            bottom: 'justify-end'
                        }[segment.contentPosition] || 'justify-end';
                        
                        const textSizeClasses = {
                            small: 'text-xl lg:text-2xl',
                            medium: 'text-2xl lg:text-3xl',
                            large: 'text-3xl lg:text-4xl'
                        }[segment.textSize] || 'text-2xl lg:text-3xl';

                        const descriptionSizeClasses = {
                            small: 'text-xs lg:text-sm',
                            medium: 'text-sm lg:text-base',
                            large: 'text-base lg:text-lg'
                        }[segment.textSize] || 'text-sm lg:text-base';
                        
                        return `
                            <div class="swiper-slide" ${bgStyle}>
                                ${mediaTag}
                                ${segment.showOverlay ? '<div class="slide-overlay"></div>' : ''}
                                <div class="z-10 p-6 flex flex-col ${contentPositionClass} h-full w-full text-left">
                                    <div class="mb-10">
                                        <h2 class="font-poppins font-bold mb-2 text-shadow ${textSizeClasses}">${segment.title}</h2>
                                        <div class="text-shadow ${descriptionSizeClasses}">${segment.description}</div>
                                    </div>
                                    ${segment.showButton ? `
                                    <button 
                                        class="read-more-btn bg-[#fd572b] text-white font-bold py-2 px-4 text-sm rounded-full self-start transition-transform hover:scale-105 shadow-lg flex items-center gap-2 group"
                                        data-news-index="${newsIndex}"
                                        data-segment-index="${segmentIndex}">
                                        <span>Leia Mais</span>
                                        <span class="transition-transform group-hover:-translate-y-1 text-lg">&#9650;</span>
                                    </button>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');

                    verticalSlide.innerHTML = `<div class="swiper swiper-container-h"><div class="swiper-wrapper">${slidesHTML}</div><div class="swiper-pagination"></div></div>`;
                    newsWrapper.appendChild(verticalSlide);
                });

                const categories = ['Todas', ...new Set(newsData.map(item => item.category))];
                categoriesWrapper.innerHTML = categories.map(cat => `
                    <div class="swiper-slide !w-auto">
                        <a href="#" class="category-link inline-block text-white/80 text-xs py-1 px-3 rounded-full bg-white/10 backdrop-blur-sm transition-all duration-300" data-category="${cat}">${cat}</a>
                    </div>`
                ).join('');
            }
            
            function initSwipers() {
                new Swiper('.swiper-container-categories', { slidesPerView: 'auto', spaceBetween: 10, freeMode: true });

                mainSwiper = new Swiper('.swiper-container-v', {
                    direction: 'vertical',
                    speed: 500,
                    on: {
                        init: function () {
                           this.slides.forEach(slide => {
                                new Swiper(slide.querySelector('.swiper-container-h'), { pagination: { el: '.swiper-pagination', clickable: true }, speed: 500 });
                            });
                            updateActiveCategory(this);
                        },
                        slideChange: function() { updateActiveCategory(this); }
                    },
                });
            }

            function updateActiveCategory(swiper) {
                if (!swiper || !swiper.slides || swiper.slides.length === 0) return;
                const activeSlide = swiper.slides[swiper.activeIndex];
                if (!activeSlide) return;
                const activeCategory = activeSlide.dataset.category;

                document.querySelectorAll('.category-link').forEach(link => {
                    link.classList.toggle('active', link.dataset.category === activeCategory);
                });
                const anyOtherCategoryIsActive = Array.from(document.querySelectorAll('.category-link.active')).some(link => link.dataset.category !== 'Todas');
                document.querySelector('.category-link[data-category="Todas"]')?.classList.toggle('active', !anyOtherCategoryIsActive);
            }
            
            function openModal(newsIndex, segmentIndex) {
                const story = newsData[newsIndex];
                const segment = story.segments[segmentIndex];

                const imageUrl = story.featuredImageUrl || segment.mediaUrl;
                
                document.getElementById('modal-img').src = imageUrl || '';
                document.getElementById('modal-img').style.display = imageUrl ? 'block' : 'none';
                
                document.getElementById('modal-title').innerText = story.postTitle;
                document.getElementById('modal-body').innerHTML = story.postContent;
                modal.classList.remove('invisible', 'opacity-0');
            }

            function closeModal() { modal.classList.add('invisible', 'opacity-0'); }

            function setupEventListeners() {
                categoriesWrapper.addEventListener('click', (e) => {
                    if (e.target.classList.contains('category-link')) {
                        e.preventDefault();
                        const category = e.target.dataset.category;
                        let slideIndex = 0;
                        if (category !== 'Todas') {
                           slideIndex = newsData.findIndex(item => item.category === category);
                        }
                        if(mainSwiper && slideIndex !== -1) mainSwiper.slideTo(slideIndex);
                    }
                });

                newsWrapper.addEventListener('click', (e) => {
                    const readMoreBtn = e.target.closest('.read-more-btn');
                    if (readMoreBtn) {
                        const { newsIndex, segmentIndex } = readMoreBtn.dataset;
                        openModal(newsIndex, segmentIndex);
                    }
                });

                closeModalBtn.addEventListener('click', closeModal);
                modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

                if (onboardingOverlay) {
                    onboardingOverlay.addEventListener('click', () => {
                        onboardingOverlay.classList.add('opacity-0', 'pointer-events-none');
                        setTimeout(() => onboardingOverlay.style.display = 'none', 500);
                    });
                }
            }

            async function main() {
                resizeAndPositionFrame();
                
                const fetchedData = await fetchNewsData();
                if (fetchedData) {
                    newsData = fetchedData;
                    populateNewsAndCategories();
                    initSwipers();
                    setupEventListeners();
                    loaderContainer.classList.add('hidden');

                    const isFirstVisit = !localStorage.getItem('hasVisitedComMarilia');
                    if (isFirstVisit) {
                        onboardingOverlay.classList.remove('hidden');
                        onboardingOverlay.classList.add('flex');
                        setTimeout(() => onboardingOverlay.classList.add('opacity-100'), 50);
                        localStorage.setItem('hasVisitedComMarilia', 'true');
                    }
                }
            }

            main();
        });
    </script>
</body>
</html>
